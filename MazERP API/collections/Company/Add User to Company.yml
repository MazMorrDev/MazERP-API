info:
  name: Add User to Company
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:5148/api/company/assign
  headers:
    - name: companyId
      value: "1"
  body:
    type: json
    data: |-
      {
        "userId":3,
        "role":1
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");
        req.setHeader("Authorization", "Bearer "+token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
