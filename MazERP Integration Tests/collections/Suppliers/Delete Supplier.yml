info:
  name: Delete Supplier
  type: http
  seq: 1
  description: Deletes a supplier by its ID

docs: |-
  This endpoint allows authenticated users to delete a supplier from the system.

  Request:
  - Method: DELETE
  - URL: /api/supplier/{supplierId}
  - Auth: Requires Bearer token in Authorization header
  - Headers: companyId (ID of the company)

  Response:
  - Success: Returns confirmation of deletion
  - Error: Returns appropriate error message for supplier not found or unauthorized access

http:
  method: DELETE
  url: http://localhost:5148/api/supplier/{{supplierId}}
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);
        req.setHeader("companyId", "1");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
