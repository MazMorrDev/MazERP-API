info:
  name: Update Supplier
  type: http
  seq: 1
  description: Updates an existing supplier by its ID

docs: |-
  This endpoint allows authenticated users to update an existing supplier's details.

  Request:
  - Method: PUT
  - URL: /api/supplier/{supplierId}
  - Body: JSON with updated supplier details
  - Auth: Requires Bearer token in Authorization header
  - Headers: companyId (ID of the company)

  Response:
  - Success: Returns the updated supplier data
  - Error: Returns appropriate error message for validation failures, supplier not found, or unauthorized access

http:
  method: PUT
  url: http://localhost:5148/api/supplier/{{supplierId}}
  body:
    type: json
    data: |-
      {
        "name": "Updated Supplier",
        "contactPerson": "Jane Smith",
        "email": "updated@supplier.com",
        "phone": "987654321",
        "location": "Updated Location",
        "rating": 4
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);
        req.setHeader("companyId", "1");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
