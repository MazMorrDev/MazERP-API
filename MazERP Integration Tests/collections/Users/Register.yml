info:
  name: Register
  type: http
  seq: 2
  description: Registers a new user in the system
  documentation: |
    This endpoint allows new users to register by providing their email, name, and password.
    
    Request:
    - Method: POST
    - URL: /api/user/register
    - Body: JSON with email, name, and password fields
    
    Response:
    - Success: Returns the created user data
    - Error: Returns appropriate error message for validation failures or duplicate email

http:
  method: POST
  url: http://localhost:5148/api/user/register
  body:
    type: json
    data: |-
      {
        "email":"pepito@gmail.com",
        "name":"Example Name",
        "password":"1234"  
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
