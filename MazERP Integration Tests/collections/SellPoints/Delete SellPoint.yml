info:
  name: Delete SellPoint
  type: http
  seq: 1
  description: Deletes a sell point by its ID
  documentation: |
    This endpoint allows authenticated users to delete a sell point from the system.
    
    Request:
    - Method: DELETE
    - URL: /api/sellpoint/{sellPointId}
    - Auth: Requires Bearer token in Authorization header
    - Headers: companyId (ID of the company)
    
    Response:
    - Success: Returns confirmation of deletion
    - Error: Returns appropriate error message for sell point not found or unauthorized access

http:
  method: DELETE
  url: http://localhost:5148/api/sellpoint/{{sellPointId}}
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);
        req.setHeader("companyId", "1");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
