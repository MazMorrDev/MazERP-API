info:
  name: Get Inventories by Warehouse
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:5148/api/inventory/by-warehouse/1
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);
        req.setHeader("companyId", "1");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
