info:
  name: Delete Inventory
  type: http
  seq: 5

http:
  method: DELETE
  url: http://localhost:5148/api/inventory/{{inventoryId}}
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);
        req.setHeader("companyId", "1");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
