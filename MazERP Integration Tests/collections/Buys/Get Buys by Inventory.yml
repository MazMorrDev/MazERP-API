info:
  name: Get Buys by Inventory
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:5148/api/buy/by-inventory/1
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);
        req.setHeader("companyId", "1");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
