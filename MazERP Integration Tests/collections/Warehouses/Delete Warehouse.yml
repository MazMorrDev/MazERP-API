info:
  name: Delete Warehouse
  type: http
  seq: 4
  description: Deletes a warehouse by its ID
  documentation: |
    This endpoint allows authenticated users to delete a warehouse from the system.
    
    Request:
    - Method: DELETE
    - URL: /api/warehouse/{warehouseId}
    - Auth: Requires Bearer token in Authorization header
    
    Response:
    - Success: Returns confirmation of deletion
    - Error: Returns appropriate error message for warehouse not found or unauthorized access

http:
  method: DELETE
  url: http://localhost:5148/api/warehouse/{{warehouseId}}
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
