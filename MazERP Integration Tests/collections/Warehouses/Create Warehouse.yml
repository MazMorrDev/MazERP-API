info:
  name: Create Warehouse
  type: http
  seq: 1
  description: Creates a new warehouse in the system

docs: |-
  This endpoint allows authenticated users to create a new warehouse.

  Request:
  - Method: POST
  - URL: /api/warehouse
  - Body: JSON with companyId, name, and description fields
  - Auth: Requires Bearer token in Authorization header

  Response:
  - Success: Returns the created warehouse data including its ID
  - Error: Returns appropriate error message for validation failures or unauthorized access

http:
  method: POST
  url: http://localhost:5148/api/warehouse
  body:
    type: json
    data: |-
      {
        "companyId":1,
        "name":"Test Warehouse",
        "description":"Test warehouse description"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);

    - type: after-response
      code: |-
        bru.setGlobalEnvVar("warehouseId", res.body.id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
