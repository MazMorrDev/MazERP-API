info:
  name: Get Warehouses by Company
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:5148/api/warehouse/by-company/1
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
