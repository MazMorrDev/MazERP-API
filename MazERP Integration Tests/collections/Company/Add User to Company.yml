info:
  name: Add User to Company
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:5148/api/company/assign
  headers:
    - name: companyId
      value: "1"
  body:
    type: json
    data: |-
      {
        "userId":1,
        "role":1
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");
        req.setHeader("Authorization", "Bearer "+token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This endpoint assigns an existing user to a company with a specified role.

  Request:
  - Method: POST
  - URL: /api/company/assign
  - Headers: companyId (ID of the company)
  - Body: JSON with userId and role fields

  Response:
  - Success: Returns confirmation of the assignment
  - Error: Returns appropriate error message for invalid user or company
