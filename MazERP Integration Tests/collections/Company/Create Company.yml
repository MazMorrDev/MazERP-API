info:
  name: Create Company
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:5148/api/company/create
  body:
    type: json
    data: |-
      {
        "userId":{{userId}},
        "name":"Example2 Corp",
        "description":"another example corp",
        "currency":3
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
