info:
  name: Update Product
  type: http
  seq: 3

http:
  method: PUT
  url: http://localhost:5148/api/product/{{productId}}
  body:
    type: json
    data: |-
      {
        "productId":{{productId}},
        "warehouseId":1,
        "productName":"Updated Standalone Product",
        "productDescription":"Updated description",
        "photoUrl":"https://example.com/updated-product.jpg",
        "productCategory":2,
        "stock":75,
        "baseDiscount":10,
        "basePrice":120.00,
        "averageCost":70.00,
        "alertStock":10,
        "warningStock":20
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);
        req.setHeader("companyId", "1");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
