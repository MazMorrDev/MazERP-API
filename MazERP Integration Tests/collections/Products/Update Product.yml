info:
  name: Update Product
  type: http
  seq: 3
  description: Updates an existing product by its ID
  documentation: |
    This endpoint allows authenticated users to update an existing product's details.
    
    Request:
    - Method: PUT
    - URL: /api/product/{productId}
    - Body: JSON with updated product details
    - Auth: Requires Bearer token in Authorization header
    - Headers: companyId (ID of the company)
    
    Response:
    - Success: Returns the updated product data
    - Error: Returns appropriate error message for validation failures, product not found, or unauthorized access

http:
  method: PUT
  url: http://localhost:5148/api/product/{{productId}}
  body:
    type: json
    data: |-
      {
        "productId":{{productId}},
        "warehouseId":1,
        "productName":"Updated Standalone Product",
        "productDescription":"Updated description",
        "photoUrl":"https://example.com/updated-product.jpg",
        "productCategory":2,
        "stock":75,
        "baseDiscount":10,
        "basePrice":120.00,
        "averageCost":70.00,
        "alertStock":10,
        "warningStock":20
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const token = bru.getGlobalEnvVar("tokenValue");

        req.setHeader("Authorization", "Bearer "+token);
        req.setHeader("companyId", "1");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
